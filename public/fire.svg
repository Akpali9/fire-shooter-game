<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="fireGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3300;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer flame glow -->
  <path d="M50 85 C30 85 20 70 20 55 C20 40 35 25 50 10 C65 25 80 40 80 55 C80 70 70 85 50 85Z" 
        fill="url(#fireGradient)" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Main flame body -->
  <path d="M50 80 C35 80 25 65 25 52 C25 40 38 28 50 15 C62 28 75 40 75 52 C75 65 65 80 50 80Z" 
        fill="url(#fireGradient)"/>
  
  <!-- Inner bright core -->
  <path d="M50 70 C40 70 35 60 35 52 C35 45 42 38 50 28 C58 38 65 45 65 52 C65 60 60 70 50 70Z" 
        fill="#ffcc00" opacity="0.8"/>
  
  <!-- Highlight -->
  <path d="M50 60 C45 60 42 55 42 50 C42 46 46 42 50 36 C54 42 58 46 58 50 C58 55 55 60 50 60Z" 
        fill="#ffffff" opacity="0.6"/>
  
  <!-- Ember sparks -->
  <circle cx="30" cy="40" r="2" fill="#ff6600" opacity="0.8">
    <animate attributeName="cy" values="40;20;40" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="35" r="1.5" fill="#ff9900" opacity="0.7">
    <animate attributeName="cy" values="35;15;35" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="25" r="2.5" fill="#ffcc00" opacity="0.9">
    <animate attributeName="cy" values="25;5;25" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
